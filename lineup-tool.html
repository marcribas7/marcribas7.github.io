<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RIG HAGA U18 · Lineup Combinations</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
[data-theme="dark"] {
  --bg: #0a0e17;
  --surface: #111620;
  --surface2: #171d2e;
  --border: #1e2740;
  --accent: #e8c44a;
  --accent2: #4a9de8;
  --red: #e84a4a;
  --green: #4ae87a;
  --text: #e8eaf0;
  --muted: #6b7899;
  --tag-bg: #171d2e;
  --tag-border: #1e2740;
}
[data-theme="light"] {
  --bg: #f4f5f7;
  --surface: #ffffff;
  --surface2: #eef0f4;
  --border: #d4d8e2;
  --accent: #b8960a;
  --accent2: #1a6dbf;
  --red: #c0392b;
  --green: #1a7a3c;
  --text: #1a1e2e;
  --muted: #7a83a0;
  --tag-bg: #eef0f4;
  --tag-border: #d4d8e2;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'IBM Plex Sans', sans-serif; min-height: 100vh; transition: background 0.2s, color 0.2s; }

.header {
  border-bottom: 1px solid var(--border);
  padding: 18px 28px 14px;
  display: flex; align-items: flex-end; justify-content: space-between; flex-wrap: wrap; gap: 12px;
}
.header-left { display: flex; align-items: flex-end; gap: 24px; flex-wrap: wrap; }
.header-title .club { font-family: 'Bebas Neue', sans-serif; font-size: 30px; letter-spacing: 2px; color: var(--accent); }
.header-title .sub { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--muted); letter-spacing: 3px; text-transform: uppercase; margin-top: 3px; }
.record { font-family: 'Bebas Neue', sans-serif; font-size: 22px; color: var(--text); letter-spacing: 1px; }
.record span { color: var(--accent); }
.header-right { display: flex; align-items: center; gap: 16px; }
.coach-credit { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--muted); text-align: right; line-height: 1.5; }

.theme-toggle {
  background: transparent; border: 1px solid var(--border);
  color: var(--muted); cursor: pointer; padding: 6px 10px;
  border-radius: 4px; font-size: 14px; transition: all 0.15s;
}
.theme-toggle:hover { border-color: var(--accent); color: var(--accent); }

/* NOTE BANNER */
.note-banner {
  background: var(--surface2); border-bottom: 1px solid var(--border);
  padding: 8px 28px;
  font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--muted);
  display: flex; align-items: center; gap: 8px;
}
.note-banner .note-icon { color: var(--accent); font-size: 13px; }
.note-banner strong { color: var(--text); }

/* CONTROLS */
.controls {
  padding: 14px 28px;
  display: flex; gap: 10px; flex-wrap: wrap; align-items: center;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
}
.view-group, .size-group { display: flex; gap: 4px; }
.btn {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px; font-weight: 500; letter-spacing: 1px;
  padding: 7px 14px; border-radius: 4px; cursor: pointer;
  border: 1px solid var(--border);
  background: transparent; color: var(--muted);
  transition: all 0.15s; text-transform: uppercase; white-space: nowrap;
}
.btn:hover { border-color: var(--accent); color: var(--accent); }
.btn.active { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 600; }
.btn.win-btn.active { background: var(--green); color: #fff; border-color: var(--green); }
.btn.loss-btn { border-color: var(--red); color: var(--red); }
.btn.loss-btn.active { background: var(--red); color: #fff; }
.divider { width: 1px; background: var(--border); margin: 0 4px; align-self: stretch; }
.game-select { display: none; gap: 4px; flex-wrap: wrap; }
.game-select.visible { display: flex; }

/* PLAYER FILTER PILLS */
.player-filter {
  width: 100%; display: flex; gap: 6px; flex-wrap: wrap; align-items: center;
  padding: 10px 28px 12px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
}
.pf-label { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1.5px; white-space: nowrap; margin-right: 4px; }
.pill {
  font-family: 'IBM Plex Mono', monospace; font-size: 11px;
  padding: 4px 11px; border-radius: 20px; cursor: pointer;
  border: 1px solid var(--border); background: transparent; color: var(--muted);
  transition: all 0.15s; white-space: nowrap;
}
.pill:hover { border-color: var(--accent); color: var(--accent); }
.pill.active { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 600; }
.pill.pg { }
.pill.pg.active { background: var(--accent); }
.pill-clear { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--muted); background: transparent; border: none; cursor: pointer; padding: 4px 6px; text-decoration: underline; }
.pill-clear:hover { color: var(--accent); }

.sort-label { font-size: 11px; color: var(--muted); font-family: 'IBM Plex Mono', monospace; text-transform: uppercase; letter-spacing: 1px; }
.min-select {
  font-family: 'IBM Plex Mono', monospace; font-size: 11px;
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--text); padding: 7px 10px; border-radius: 4px; cursor: pointer; outline: none;
}
.min-select:focus { border-color: var(--accent); }

.context-bar {
  padding: 8px 28px;
  background: var(--surface2); border-bottom: 1px solid var(--border);
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px; color: var(--muted);
  display: flex; gap: 20px; align-items: center; flex-wrap: wrap; min-height: 36px;
}
.ctx-val { color: var(--text); font-weight: 500; }
.ctx-win { color: var(--green); }
.ctx-loss { color: var(--red); }

.summary-bar { display: flex; gap: 0; border-bottom: 1px solid var(--border); overflow-x: auto; }
.stat-card {
  flex: 1; min-width: 120px; padding: 14px 20px;
  border-right: 1px solid var(--border); transition: background 0.15s;
}
.stat-card:last-child { border-right: none; }
.stat-card .sc-label { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 6px; }
.stat-card .sc-val { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 1px; color: var(--accent); line-height: 1; }
.stat-card .sc-sub { font-size: 11px; color: var(--muted); margin-top: 3px; font-family: 'IBM Plex Mono', monospace; }

.table-wrap { overflow-x: auto; padding: 0 0 40px; }
table { width: 100%; border-collapse: collapse; }
thead th {
  font-family: 'IBM Plex Mono', monospace; font-size: 10px;
  color: var(--muted); text-transform: uppercase; letter-spacing: 1.5px;
  padding: 10px 16px; border-bottom: 1px solid var(--border);
  text-align: left; cursor: pointer; white-space: nowrap;
  user-select: none; position: sticky; top: 0; background: var(--bg); z-index: 2;
}
thead th:hover { color: var(--accent); }
thead th.sorted { color: var(--accent); }
thead th.sorted::after { content: ' ↓'; }
thead th.sorted.asc::after { content: ' ↑'; }
tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
tbody tr:hover { background: var(--surface); }
tbody td { padding: 11px 16px; font-size: 13px; }
.players-cell { display: flex; gap: 6px; flex-wrap: wrap; }
.player-tag {
  background: var(--tag-bg); border: 1px solid var(--tag-border);
  padding: 3px 8px; border-radius: 3px;
  font-family: 'IBM Plex Mono', monospace; font-size: 11px;
  color: var(--text); white-space: nowrap;
}
.player-tag.pg { border-color: var(--accent); color: var(--accent); }
.player-tag.sg { border-color: var(--accent2); color: var(--accent2); }
.pm { font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 0.5px; }
.pm.pos { color: var(--green); }
.pm.neg { color: var(--red); }
.pm.zero { color: var(--muted); }
.mono { font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--muted); }
.mono.hi { color: var(--text); }
.bar-wrap { display: flex; align-items: center; gap: 8px; }
.bar-bg { width: 60px; height: 4px; background: var(--border); border-radius: 2px; flex-shrink: 0; }
.bar-fill { height: 4px; border-radius: 2px; }
.bar-fill.off { background: var(--green); }
.bar-fill.def { background: var(--red); }
.empty-state { text-align: center; padding: 60px 20px; font-family: 'IBM Plex Mono', monospace; font-size: 13px; color: var(--muted); }
.count-badge {
  font-family: 'IBM Plex Mono', monospace; font-size: 10px;
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--muted); padding: 2px 7px; border-radius: 10px; margin-left: 6px;
}
</style>
</head>

const GAME_META = {"r1g1": {"label": "R1 G1", "opp": "Vienna UNITED", "result": "86\u201367", "win": true, "date": "14.11.2025"}, "r1g3": {"label": "R1 G3", "opp": "MBK Ru\u017eomberok", "result": "71\u201364", "win": true, "date": "15.11.2025"}, "r1g4": {"label": "R1 G4", "opp": "Soproni Darazsak", "result": "85\u201366", "win": true, "date": "16.11.2025"}, "r2g1": {"label": "R2 G1", "opp": "Young Angels Ko\u0161ice", "result": "63\u201369", "win": false, "date": "05.02.2026"}, "r2g2": {"label": "R2 G2", "opp": "Young Angels Ko\u0161ice", "result": "105\u201363", "win": true, "date": "06.02.2026"}, "r2g3": {"label": "R2 G3", "opp": "DVTK Miskolc", "result": "82\u201380", "win": true, "date": "08.02.2026"}, "r2g4": {"label": "R2 G4", "opp": "Vienna UNITED", "result": "89\u201343", "win": true, "date": "07.02.2026"}};
const ALL_PLAYERS = ['Rachel', 'Sasha', 'Ronja', 'Alva', 'Maleah', 'Alma', 'Leila', 'Signe', 'Wilma', 'Elisa', 'Amanda'];

const PGS = new Set(['Signe','Alva','Leila']);
const SGS = new Set(['Sasha','Maleah']);

let currentView = 'total';
let currentGame = 'r1g1';
let currentSize = '2';
let sortAsc = false;
let activePlayers = new Set();

// Build player pills
function buildPlayerPills() {
  const pf = document.getElementById('playerFilter');
  pf.innerHTML = '<span class="pf-label">Player:</span>';
  ALL_PLAYERS.forEach(p => {
    const pill = document.createElement('button');
    pill.className = 'pill' + (PGS.has(p) ? ' pg' : SGS.has(p) ? ' sg' : '');
    pill.textContent = p;
    pill.id = 'pill_' + p;
    pill.onclick = () => togglePlayer(p);
    pf.appendChild(pill);
  });
  const clr = document.createElement('button');
  clr.className = 'pill-clear';
  clr.textContent = 'clear';
  clr.id = 'pillClear';
  clr.style.display = 'none';
  clr.onclick = () => { activePlayers.clear(); updatePills(); render(); };
  pf.appendChild(clr);
}

function togglePlayer(p) {
  if (activePlayers.has(p)) activePlayers.delete(p);
  else activePlayers.add(p);
  updatePills();
  render();
}

function updatePills() {
  ALL_PLAYERS.forEach(p => {
    const el = document.getElementById('pill_' + p);
    if (el) el.classList.toggle('active', activePlayers.has(p));
  });
  const clr = document.getElementById('pillClear');
  if (clr) clr.style.display = activePlayers.size ? 'inline' : 'none';
}

function setView(v, btn) {
  currentView = v;
  document.querySelectorAll('.view-group .btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('gameSelect').classList.toggle('visible', v === 'game');
  if (v === 'game') updateGameButtons();
  render();
}

function setSize(s, btn) {
  currentSize = s;
  document.querySelectorAll('.size-group .btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function setGame(gid) {
  currentGame = gid;
  document.querySelectorAll('.game-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('gbtn_' + gid).classList.add('active');
  render();
}

function updateGameButtons() {
  const sel = document.getElementById('gameSelect');
  sel.innerHTML = '';
  const order = ['r1g1','r1g3','r1g4','r2g1','r2g2','r2g3','r2g4'];
  order.forEach(gid => {
    const m = GAME_META[gid];
    const btn = document.createElement('button');
    btn.id = 'gbtn_' + gid;
    btn.className = 'btn game-btn' + (m.win ? ' win-btn' : ' loss-btn') + (gid === currentGame ? ' active' : '');
    btn.textContent = m.label + ' ' + m.result;
    btn.onclick = () => setGame(gid);
    sel.appendChild(btn);
  });
}

function getData() {
  if (currentView === 'total') return DATA.total[currentSize] || [];
  if (currentView === 'r1') return DATA.r1[currentSize] || [];
  if (currentView === 'r2') return DATA.r2[currentSize] || [];
  if (currentView === 'game') return (DATA.games[currentGame] || {})[currentSize] || [];
  return [];
}

function getContext() {
  if (currentView === 'total') return {label: 'All 7 Games', detail: '6W · 1L'};
  if (currentView === 'r1') return {label: 'Round 1', detail: '3 games · 3W · 0L'};
  if (currentView === 'r2') return {label: 'Round 2', detail: '4 games · 3W · 1L'};
  if (currentView === 'game') {
    const m = GAME_META[currentGame];
    return {label: m.label + ' vs ' + m.opp, detail: m.result + ' · ' + m.date, win: m.win};
  }
}

function updateContext() {
  const ctx = getContext();
  const bar = document.getElementById('contextBar');
  const wClass = ctx.win === false ? 'ctx-loss' : (ctx.win === true ? 'ctx-win' : '');
  const playerInfo = activePlayers.size ? ` · <span class="ctx-val" style="color:var(--accent)">Filtering: ${[...activePlayers].join(' + ')}</span>` : '';
  bar.innerHTML = `
    <div style="display:flex;gap:20px;align-items:center;flex-wrap:wrap">
      <span>VIEW <span class="ctx-val">${ctx.label}</span></span>
      <span>RECORD <span class="ctx-val ${wClass}">${ctx.detail}</span></span>
      <span>SIZE <span class="ctx-val">${currentSize}-MAN</span></span>
      ${playerInfo}
    </div>`;
}

function updateSummary(rows) {
  if (!rows.length) { document.getElementById('summaryBar').innerHTML = ''; return; }
  const best_pm = rows.reduce((a,b) => b.plus_minus > a.plus_minus ? b : a);
  const best_off = rows.reduce((a,b) => b.pts_per_min > a.pts_per_min ? b : a);
  const best_def = rows.reduce((a,b) => b.pts_allowed_per_min < a.pts_allowed_per_min ? b : a);
  const most_time = rows.reduce((a,b) => b.mins > a.mins ? b : a);
  const pmSign = best_pm.plus_minus >= 0 ? '+' : '';
  const cards = [
    {label: 'Best +/−', val: pmSign + best_pm.plus_minus, sub: best_pm.players.join(' · ')},
    {label: 'Most Time', val: most_time.mins + 'm', sub: most_time.players.join(' · ')},
    {label: 'Best Offense', val: best_off.pts_per_min.toFixed(1) + ' pt/m', sub: best_off.players.join(' · ')},
    {label: 'Best Defense', val: best_def.pts_allowed_per_min.toFixed(1) + ' pt/m', sub: best_def.players.join(' · ')},
    {label: 'Combos', val: rows.length, sub: currentSize + '-man · ' + document.getElementById('minMins').value + 'min+'},
  ];
  document.getElementById('summaryBar').innerHTML = cards.map(c =>
    `<div class="stat-card"><div class="sc-label">${c.label}</div><div class="sc-val">${c.val}</div><div class="sc-sub">${c.sub}</div></div>`
  ).join('');
}

function render() {
  updateContext();
  const minM = parseFloat(document.getElementById('minMins').value);
  let rows = getData().filter(r => r.mins >= minM);
  if (activePlayers.size) rows = rows.filter(r => [...activePlayers].every(p => r.players.includes(p)));
  const col = document.getElementById('sortSelect').value;
  rows = [...rows].sort((a,b) => {
    let av, bv;
    if (col === 'pts_allowed_per_min_asc') { av = a.pts_allowed_per_min; bv = b.pts_allowed_per_min; return av - bv; }
    av = a[col]; bv = b[col];
    return sortAsc ? av - bv : bv - av;
  });
  updateSummary(rows);

  const maxOff = rows.length ? Math.max(...rows.map(r => r.pts_per_min)) : 1;
  const maxDef = rows.length ? Math.max(...rows.map(r => r.pts_allowed_per_min)) : 1;

  document.getElementById('tableHead').innerHTML = `<tr>
    <th>Players <span class="count-badge">${rows.length}</span></th>
    <th class="sorted${sortAsc?' asc':''}" onclick="toggleSort('plus_minus')">+/−</th>
    <th onclick="toggleSort('mins')">Minutes</th>
    <th onclick="toggleSort('pts_per_min')">Offense</th>
    <th onclick="toggleSort('pts_allowed_per_min_asc')">Defense</th>
    <th onclick="toggleSort('segments')">Segs</th>
  </tr>`;

  const body = document.getElementById('tableBody');
  if (!rows.length) {
    body.innerHTML = `<tr><td colspan="6"><div class="empty-state">No combos found.</div></td></tr>`;
    return;
  }
  body.innerHTML = rows.map(r => {
    const pmClass = r.plus_minus > 0 ? 'pos' : r.plus_minus < 0 ? 'neg' : 'zero';
    const pmStr = (r.plus_minus >= 0 ? '+' : '') + r.plus_minus;
    const offPct = Math.round((r.pts_per_min / maxOff) * 100);
    const defPct = Math.round((r.pts_allowed_per_min / maxDef) * 100);
    const tags = r.players.map(p => {
      const cls = PGS.has(p) ? 'pg' : SGS.has(p) ? 'sg' : '';
      const hi = activePlayers.has(p) ? 'style="font-weight:700"' : '';
      return `<span class="player-tag ${cls}" ${hi}>${p}</span>`;
    }).join('');
    return `<tr>
      <td><div class="players-cell">${tags}</div></td>
      <td><span class="pm ${pmClass}">${pmStr}</span></td>
      <td><span class="mono hi">${r.mins}m</span> <span class="mono">${r.rig_pts}–${r.opp_pts}</span></td>
      <td><div class="bar-wrap"><span class="mono hi">${r.pts_per_min.toFixed(1)}</span><div class="bar-bg"><div class="bar-fill off" style="width:${offPct}%"></div></div></div></td>
      <td><div class="bar-wrap"><span class="mono hi">${r.pts_allowed_per_min.toFixed(1)}</span><div class="bar-bg"><div class="bar-fill def" style="width:${defPct}%"></div></div></div></td>
      <td><span class="mono">${r.segments}</span></td>
    </tr>`;
  }).join('');
}

function toggleSort(col) {
  const sel = document.getElementById('sortSelect');
  const mapped = col === 'pts_allowed_per_min' ? 'pts_allowed_per_min_asc' : col;
  if (sel.value === mapped) sortAsc = !sortAsc;
  else { sel.value = mapped; sortAsc = false; }
  render();
}

function toggleTheme() {
  const html = document.documentElement;
  const isDark = html.getAttribute('data-theme') === 'dark';
  html.setAttribute('data-theme', isDark ? 'light' : 'dark');
  document.querySelector('.theme-toggle').textContent = isDark ? '☾' : '☀︎';
}

buildPlayerPills();
updateGameButtons();
render();
</script>
