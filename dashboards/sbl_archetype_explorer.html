function ordinal(n){const s=["th","st","nd","rd"];const v=n%100;return n+(s[(v-20)%10]||s[v]||s[0])}

function adjective(rank, total) {
  const pct = rank / total;
  if (pct <= 0.25) return ['exceptional','remarkable','elite','outstanding','impressive','dominant'][Math.floor(Math.random()*6)];
  if (pct <= 0.5) return ['solid','strong','reliable','efficient','proficient'][Math.floor(Math.random()*5)];
  if (pct <= 0.75) return ['moderate','reasonable','decent','adequate'][Math.floor(Math.random()*4)];
  return ['limited','concerning','lackluster','minimal'][Math.floor(Math.random()*4)];
}

function adjRank(rank, total) {
  const pct = rank / total;
  if (pct <= 0.25) return 'elite';
  if (pct <= 0.5) return 'good';
  if (pct <= 0.75) return 'average';
  return 'poor';
}

// Compute ranks for a season
function computeRanks(allTeams, season) {
  const inSeason = allTeams.filter(t => t[1] === season);
  const n = inSeason.length;
  if (n === 0) return {};
  
  const ranks = {};
  for (let ai = 0; ai < 8; ai++) {
    const sorted = [...inSeason].sort((a,b) => {
      const ta = a[4].reduce((s,v)=>s+v,0);
      const tb = b[4].reduce((s,v)=>s+v,0);
      return (b[4][ai]/tb) - (a[4][ai]/ta);
    });
    sorted.forEach((t,i) => {
      const key = t[0] + '|' + t[1];
      if (!ranks[key]) ranks[key] = {n, r: []};
      ranks[key].r[ai] = i + 1;
    });
  }
  return ranks;
}

  let lines = [];
  
  // Abbreviate team name
  const tshort = team.replace(/ Basket/g,'').replace('KFUM ','').replace('Telge Sodertalje','Södertälje');
  
  // Primary identity with FASTINTELLIGENCE pattern
  const topAdj = adjective(top.rank, n);
  lines.push(`${tshort} allocates an ${topAdj} <b>${top.p.toFixed(1)}%</b> of its minutes-weighted production to ${top.n} (${ordinal(top.rank)}).`);
  
  // Second archetype
  if (sec.p >= 12) {
    const secAdj = adjective(sec.rank, n);
    lines.push(`Their secondary identity is ${sec.n} at <b>${sec.p.toFixed(1)}%</b> (${ordinal(sec.rank)}), a ${secAdj} rate.`);
  }
  
  // Tactical interpretation
  if (top.i === 4 && top.p >= 25) {
    lines.push('This is a transition-heavy team that pushes pace and thrives in the open court — expect fast breaks and early offense.');
  } else if (top.i === 2 && top.p >= 22) {
    lines.push('Offense runs through primary creators — heavily reliant on PnR handler and isolation generation.');
  } else if (top.i === 6 && top.p >= 25) {
    lines.push('A closeout-attacking offense where wings receive and drive. Typical of teams with dominant import creators drawing attention.');
  } else if (top.i === 0 && top.p >= 22) {
    lines.push('Built around off-ball movement and screening actions — this team generates looks through motion rather than individual creation.');
  } else if (top.i === 7 && top.p >= 20) {
    lines.push('An interior-first offense built around post-ups and offensive rebounding — physical, paint-dominant style.');
  }
  
  // Gap analysis  
  if (bot.p < 4) {
    const botAdj = adjective(n - bot.rank + 1, n); // invert for "worst"
    const gapTexts = {
      0: 'Virtually no off-screen shooting — struggles to generate open looks from movement.',
      1: 'No cutting or rolling presence — limited easy baskets at the rim.',
      2: 'Lacks primary creation — concerning for half-court offense execution.',
      3: 'No spot-up shooting — floor spacing is a weakness.',
      4: 'Minimal transition game — heavily reliant on half-court sets.',
      5: 'No stretch bigs — frontcourt doesn\'t space the floor.',
      6: 'No catch-drive wings — limited closeout-attacking options.',
      7: 'No interior scoring — lacks post-up threat and offensive rebounding.'
    };
    if (gapTexts[bot.i]) lines.push(gapTexts[bot.i]);
  }
  
  
  // Efficiency context from team data
  const tdata = allTeams.find(x => x[0]===team && x[1]===season);
  if (tdata && tdata[5] && tdata[5][0] > 0) {
    const [ortg, drtg, nrtg, pace] = tdata[5];
    const allSeason = allTeams.filter(x => x[1]===season && x[5] && x[5][0]>0);
    const ortgRank = allSeason.filter(x => x[5][0] > ortg).length + 1;
    const drtgRank = allSeason.filter(x => x[5][1] < drtg).length + 1;
    const nrRank = allSeason.filter(x => x[5][2] > nrtg).length + 1;
    const paceRank = allSeason.filter(x => x[5][3] > pace).length + 1;
    const nt = allSeason.length;
    const oAdj = adjective(ortgRank, nt);
    const dAdj = adjective(drtgRank, nt);
    lines.push(`Offensively, they post an ${oAdj} <b>${ortg} ORtg</b> (${ordinal(ortgRank)}) with a <b>${drtg} DRtg</b> (${ordinal(drtgRank)}) on defense. They play at <b>${pace} possessions/game</b> (${ordinal(paceRank)}).`);
  }

  return lines.join(' ');
}

function evoNarrative(distOld, distNew, seasonOld, seasonNew, teamName, allTeams) {
  const totalOld = distOld.reduce((s,v) => s+v, 0);
  const totalNew = distNew.reduce((s,v) => s+v, 0);
  if (totalOld === 0 || totalNew === 0) return '';
  
  const pctsOld = distOld.map(v => v/totalOld*100);
  const pctsNew = distNew.map(v => v/totalNew*100);
  const names = ['Off-Screen Shooter','Rolling Big / Cutter','Lead Guard / Creator',
    'Spot-Up Specialist','Transition Scorer','Stretch Big / PnP','Catch-Drive Wing','Interior Scorer / Big'];
  const short = ['OSS','RBC','LGC','SUS','TRS','S4P','CDW','ISB'];
  
  const deltas = pctsNew.map((v,i) => ({i, d: v - pctsOld[i], n: names[i], s: short[i], 
    newP: v, oldP: pctsOld[i]})).sort((a,b) => Math.abs(b.d) - Math.abs(a.d));
  
  let lines = [];
  const big = deltas[0], sec = deltas[1];
  
  if (Math.abs(big.d) >= 5) {
    const verb = big.d > 0 ? 'increased' : 'decreased';
    const sign = big.d > 0 ? '+' : '';
    lines.push(`<b>${seasonOld} → ${seasonNew}:</b> ${big.n} ${verb} from ${big.oldP.toFixed(0)}% to <b>${big.newP.toFixed(0)}%</b> (${sign}${big.d.toFixed(0)}pp).`);
    
    if (Math.abs(sec.d) >= 5) {
      const verb2 = sec.d > 0 ? 'rose' : 'dropped';
      lines.push(`${sec.n} ${verb2} ${sec.d > 0 ? '+' : ''}${sec.d.toFixed(0)}pp.`);
    }
    
    // Interpret the shift
    if (big.i === 4 && big.d > 8) lines.push('The team added transition scoring — likely through faster-paced imports or a coaching philosophy shift toward pace.');
    else if (big.i === 2 && big.d > 8) lines.push('Added primary creation — a new lead guard likely changed the offensive ecosystem.');
    else if (big.i === 6 && big.d > 8) lines.push('More catch-drive wings — suggests a shift toward closeout-attacking offense or roster turnover among perimeter players.');
    else if (big.i === 2 && big.d < -8) lines.push('Lost primary creation — the departure of a lead guard shifted the offensive identity.');
    else if (big.i === 4 && big.d < -8) lines.push('Transition scoring dropped significantly — slower pace or different import profiles this season.');
  } else {
    lines.push(`<b>${seasonOld} → ${seasonNew}:</b> Stable identity — no archetype shifted more than 5pp. Roster continuity maintained the playing style.`);
  }
  
  return lines.join(' ');
}

function cosFit(teamDist, playerArchs) {
  // Cosine similarity between team distribution and player archetype vector
  const total = teamDist.reduce((s,v) => s+v, 0);
  const tv = teamDist.map(v => v/total);
  const pv = new Float32Array(8);
  playerArchs.forEach(a => { pv[a.id-1] = a.w; });
  let d=0, na=0, nb=0;
  for(let i=0;i<8;i++){d+=tv[i]*pv[i];na+=tv[i]*tv[i];nb+=pv[i]*pv[i]}
  return na&&nb?d/Math.sqrt(na*nb):0;
}

function rosterHTML(team, season, dist) {
  const players = P.filter(p => p.t === team && p.s === season)
    .sort((a,b) => b.tmin - a.tmin);
  if (!players.length) return '';
  
  let h = '<div class="tv-roster-t">Roster Breakdown — Player vs Team Profile</div>';
  h += '<div class="tv-team-bar-label">TEAM PROFILE</div>';
  const total = dist.reduce((s,v)=>s+v,0);
  h += '<div style="display:flex;height:20px;overflow:hidden;margin-bottom:8px">';
  dist.forEach((v,i) => {
    const p = v/total*100;
    if (p > 1) h += `<div class="tv-pl-seg" style="width:${p.toFixed(1)}%;background:${COL[i+1]}">${p>=6?SH[i+1]:''}</div>`;
  });
  h += '</div>';
  h += '<div class="tv-team-bar-label">PLAYERS (sorted by minutes)</div>';
  
  players.forEach(p => {
    const fit = cosFit(dist, p.a);
    const fitCls = fit >= 0.85 ? 'tv-fit-high' : fit >= 0.6 ? 'tv-fit-med' : 'tv-fit-low';
    const fitLabel = (fit*100).toFixed(0) + '%';
    
    const {s: shown, ow} = spA(p.a);
    let bar = shown.map(a => `<div class="tv-pl-seg" style="width:${(a.w*100).toFixed(1)}%;background:${COL[a.id]}">${a.w>=.1?SH[a.id]:''}</div>`).join('');
    if (ow > 0.005) bar += `<div class="tv-pl-seg oth" style="width:${(ow*100).toFixed(1)}%"></div>`;
    
    const stats = [];
    stats.push(`<b>${p.ppg}</b>PPG`);
    if (p.ts !== null) stats.push(`<b>${p.ts}%</b>TS`);
    if (p.nr !== null) stats.push(`<span class="${p.nr>0?'pos':'neg'}">${p.nr>0?'+':''}${p.nr}</span>NR`);
    
    h += `<div class="tv-pl">`;
    h += `<div class="tv-pl-flag">${fl(p.cc)}</div>`;
    h += `<div class="tv-pl-name">${p.n}</div>`;
    h += `<div class="tv-pl-bar">${bar}</div>`;
    h += `<div class="tv-pl-fit ${fitCls}" title="Fit with team style">${fitLabel}</div>`;
    h += `<div class="tv-pl-stats">${stats.join(' ')}</div>`;
    h += `</div>`;
  });
  
  return h;
}

}

function render(){
const ft=tf.value,fs=sf.value,fa=af.value,fq=document.getElementById('sb').value.toLowerCase().trim(),minP=parseInt(mp.value)/100,sv=sortF.value;
let pl=P.filter(p=>{
  if(ft&&p.t!==ft)return false;if(fs&&p.s!==fs)return false;
  if(natFilter===1&&!p.swe)return false;if(natFilter===2&&p.swe)return false;
  if(fa){const aw=p.a.find(a=>a.id===+fa);if(!aw||aw.w<(minP||0.001))return false}
  else if(minP>0){const pw=p.a.find(a=>a.id===p.pid);if(!pw||pw.w<minP)return false}
  if(fq&&!p.n.toLowerCase().includes(fq))return false;return true
});
if(sv==='alpha')pl.sort((a,b)=>a.n.localeCompare(b.n,'sv'));
else if(sv==='ppg')pl.sort((a,b)=>(b.ppg||0)-(a.ppg||0));
else if(sv==='p40')pl.sort((a,b)=>(b.p40||0)-(a.p40||0));
else if(sv==='ts')pl.sort((a,b)=>(b.ts||0)-(a.ts||0));
else if(sv==='nr')pl.sort((a,b)=>(b.nr||-99)-(a.nr||-99));
else if(sv==='usg')pl.sort((a,b)=>(b.usg||0)-(a.usg||0));
else if(sv==='min')pl.sort((a,b)=>b.tmin-a.tmin);
document.getElementById('ct').textContent=pl.length+' players';
const g=document.getElementById('g');
if(!pl.length){g.innerHTML='<div class="empty">No players match.</div>';renderCompare();return}
g.innerHTML=pl.map(p=>{
  const uid=p.n+'|'+p.s+'|'+p.t;const isOpen=openPlayer===uid;const isCmp=compareSet.has(p.i);
  let eff='';if(p.ts!==null)eff+=`<b>${p.ts}%TS</b> `;if(p.nr!==null)eff+=`<span class="${nrC(p.nr)}">${nrS(p.nr)}NR</span> `;if(p.usg!==null)eff+=`<b>${p.usg}%USG</b>`;
  let simH='';
  if(isOpen){const sims=findSimilar(p.i,5);simH=`<div class="sim show"><div class="sim-t">🔍 Most Similar Players</div>${sims.map(s=>`<div class="sim-r"><span class="fl" style="font-size:12px">${fl(s.p.cc)}</span><span class="sim-n">${s.p.n}</span><span class="sim-m">${s.p.t} ${s.p.s}</span><span class="sim-d">${(s.score*100).toFixed(0)}%</span></div>`).join('')}</div>`}
  let evoH='';const hist=EVO[p.n];
  if(hist&&hist.length>1){evoH=`<div class="evo${isOpen?' show':''}"><div class="evo-t">Evolution·${hist.length} Seasons</div>${hist.map(h=>{const st=[];if(h.ppg)st.push(`<b>${h.ppg}</b>pts`);if(h.ts!==null)st.push(`<b>${h.ts}%</b>TS`);if(h.nr!==null)st.push(`<span class="${nrC(h.nr)}">${nrS(h.nr)}</span>NR`);return`<div class="evo-r"><div class="evo-s">${h.s}</div><div class="evo-tm">${h.t.replace(/ Basket/g,'').replace('KFUM ','')}</div><div class="evo-b">${barH(h.a,'evo-seg',h.p40,h.ppg,h.mpg,h.ts,h.nr)}</div><div class="evo-st">${st.join(' ')}</div></div>`}).join('')}</div>`}
  const hint=(hist&&hist.length>1)?`<div class="hint">▸ ${hist.length} seasons · click to expand</div>`:'';
  return`<div class="pc${p.tmin<200?' low-min':''}${isOpen?' active':''}${isCmp?' compared':''}" data-uid="${uid}" onclick="toggle(this)">
<div class="cmp-btn${isCmp?' on':''}" onclick="toggleCompare(${p.i},event)">⚖</div>
<div class="pc-r1"><div class="pc-l"><span class="fl">${fl(p.cc)}</span><span class="pcn">${p.n}</span></div><div class="ib" style="background:${COL[p.ideal]||'#999'}">BEST:${AN[p.ideal]||''}</div></div>
<div class="pcm">${p.t}·${p.s}·${p.gp}GP·${p.mpg}min·<b>${p.p40}P/40</b>${p.tmin<200?' · <span style="color:var(--amber)">'+p.tmin+'min</span>':''}</div>
<div class="pcs"><b>${p.ppg}PPG</b><b>${p.apg}APG</b><b>${p.rpg}RPG</b> ${eff}</div>
<div class="ab">${barH(p.a,'as',p.p40,p.ppg,p.mpg,p.ts,p.nr)}</div><div class="al">${legH(p.a)}</div>${ptH(p.pt)}${hint}${evoH}${simH}</div>`;
}).join('');
document.querySelectorAll('#g .as,#g .evo-seg').forEach(el=>{el.addEventListener('mouseenter',e=>{e.stopPropagation();showTT(e,el.dataset.aid,parseFloat(el.dataset.w),el.dataset.p40,el.dataset.ppg,el.dataset.mpg,el.dataset.ts,el.dataset.nr)});el.addEventListener('mouseleave',hideTT)});
renderCompare();
}
function toggle(el){const uid=el.dataset.uid;openPlayer=openPlayer===uid?null:uid;render()}
render();
</script></body></html>
