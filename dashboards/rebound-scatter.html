  ctx.strokeStyle = '#f0b429';
  ctx.lineWidth = 1.5;
  ctx.setLineDash([8, 5]);
  ctx.beginPath(); ctx.moveTo(xS(medOrb), pad.top); ctx.lineTo(xS(medOrb), pad.top + ch); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(pad.left, yS(medDrb)); ctx.lineTo(pad.left + cw, yS(medDrb)); ctx.stroke();
  ctx.setLineDash([]);

  // Quadrant labels with TR% context
  ctx.textAlign = 'center';
  const qCenters = [
    { label: 'GLASS CLEANERS (DEF)', sub: 'High DRB% · Low ORB%', x: xS(orbMin + (medOrb - orbMin) / 2), y: yS(drbMax) + ch * 0.12 },
    { label: 'ELITE BOTH BOARDS', sub: 'High DRB% · High ORB%', x: xS(medOrb + (orbMax - medOrb) / 2), y: yS(drbMax) + ch * 0.12 },
    { label: 'WEAK BOARDS', sub: 'Low DRB% · Low ORB%', x: xS(orbMin + (medOrb - orbMin) / 2), y: yS(drbMin) - ch * 0.08 },
    { label: 'CRASHERS (OFF)', sub: 'Low DRB% · High ORB%', x: xS(medOrb + (orbMax - medOrb) / 2), y: yS(drbMin) - ch * 0.08 },
  ];
  qCenters.forEach(q => {
    ctx.globalAlpha = 0.16;
    ctx.fillStyle = '#1d3557';
    ctx.font = '700 13px Barlow Condensed';
    ctx.fillText(q.label, q.x, q.y);
    ctx.font = '400 10px Barlow';
    ctx.fillText(q.sub, q.x, q.y + 15);
  });
  ctx.globalAlpha = 1;

  // Axis labels
  ctx.fillStyle = '#999';
  ctx.font = '600 12px Barlow Condensed';
  ctx.textAlign = 'center';
  ctx.fillText('OFFENSIVE REBOUND %  →', pad.left + cw / 2, h - 8);
  ctx.save();
  ctx.translate(16, pad.top + ch / 2);
  ctx.rotate(-Math.PI / 2);
  ctx.fillText('↑  DEFENSIVE REBOUND %', 0, 0);
  ctx.restore();

  // Plot logos
  const logoSize = teams.length <= 20 ? 34 : 28;
  const half = logoSize / 2;
  const positions = [];

  // Sort by TR% so elite teams render on top
  const sorted = [...teams].sort((a, b) => (a.tr_pct || 0) - (b.tr_pct || 0));

  sorted.forEach(t => {
    const px = xS(t.orb_pct);
    const py = yS(t.drb_pct);
    const col = trColor(t.tr_pct);

    positions.push({ x: px, y: py, team: t, r: half + 3 });

    if (logoImages[t.name]) {
      // Colored ring
      ctx.beginPath();
      ctx.arc(px, py, half + 3, 0, Math.PI * 2);
      ctx.fillStyle = col;
      ctx.fill();

      // White circle + logo
      ctx.save();
      ctx.beginPath();
      ctx.arc(px, py, half + 1, 0, Math.PI * 2);
      ctx.fillStyle = '#fff';
      ctx.fill();
      ctx.clip();
      ctx.drawImage(logoImages[t.name], px - half, py - half, logoSize, logoSize);
      ctx.restore();
    } else {
      // Fallback colored dot
      ctx.beginPath();
      ctx.arc(px, py, half, 0, Math.PI * 2);
      ctx.fillStyle = col;
      ctx.globalAlpha = 0.85;
      ctx.fill();
      ctx.globalAlpha = 1;

      ctx.fillStyle = '#fff';
      ctx.font = `700 ${Math.floor(logoSize * 0.35)}px Barlow Condensed`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      const initials = t.name.split(/[\s.]+/).map(w => w[0]).join('').substring(0, 3).toUpperCase();
      ctx.fillText(initials, px, py);
    }
  });

  // Hover
  canvas.onmousemove = function(e) {
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;

    let found = null;
    // Reverse so top-rendered (elite) gets priority
    for (let i = positions.length - 1; i >= 0; i--) {
      const p = positions[i];
      if (Math.hypot(mx - p.x, my - p.y) < p.r) { found = p.team; break; }
    }

    const tt = document.getElementById('tooltip');
    if (found) {
      canvas.style.cursor = 'pointer';
      tt.style.display = 'block';
      tt.style.left = (e.clientX + 16) + 'px';
      tt.style.top = (e.clientY - 8) + 'px';
      tt.querySelector('.tt-name').textContent = found.name;
      tt.querySelector('.tt-region').textContent = found.region;
      tt.querySelector('.tt-val').innerHTML =
        `TR%: <b>${found.tr_pct}%</b><br>ORB%: ${found.orb_pct}%<br>DRB%: ${found.drb_pct}%`;
    } else {
      canvas.style.cursor = 'default';
      tt.style.display = 'none';
    }
  };
  canvas.onmouseleave = () => { document.getElementById('tooltip').style.display = 'none'; };
}

preloadLogos();
setTimeout(render, 300);
window.addEventListener('resize', render);
</script>
</body>
</html>
